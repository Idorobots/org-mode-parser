name: Parser Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-parse-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tree-sitter CLI
        run: npm install --global tree-sitter-cli@0.26.6

      - name: Bootstrap generated parser artifacts for test runner
        run: |
          if [ ! -f src/grammar.json ]; then
            tree-sitter generate
          fi
        working-directory: tree-sitter-org

      - name: Run Tree-sitter corpus tests
        run: tree-sitter test
        working-directory: tree-sitter-org

      - name: Parse-check examples and key Org files
        run: python3 check.py "examples/*.org" "*.org"
