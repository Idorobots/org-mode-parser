name: Parser Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  docs-index-sync:
    name: Docs index is up to date
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install --yes pandoc

      - name: Verify docs index is up to date
        run: pandoc README.org --from=org --to=gfm --output=/tmp/docs-index.generated.md && diff --unified docs/index.md /tmp/docs-index.generated.md

  python-library:
    name: Python library — format, lint, types, tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tree-sitter CLI
        run: npm install --global tree-sitter-cli@0.26.6

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Install Python dependencies
        run: poetry install

      - name: Run Python quality gate (format · lint · types · tests)
        run: poetry run task check
